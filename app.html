<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cubs Trivia Game</title>
  <style>
    body {
      background-color: #0e3386;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 60px;
      min-height: 100vh;
    }

    h1 {
      color: white;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 2px 2px 0 #cc3433;
    }

    .subtitle {
      color: rgba(255,255,255,0.75);
      text-align: center;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .card {
      background-color: white;
      border-radius: 6px;
      max-width: 640px;
      width: 100%;
      padding: 30px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      border-top: 6px solid #cc3433;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 16px;
    }

    .progress-bg {
      background-color: #ddd;
      border-radius: 4px;
      height: 8px;
      margin-bottom: 4px;
    }

    .progress-fill {
      background-color: #0e3386;
      height: 8px;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 18px;
    }

    .category {
      background-color: #0e3386;
      color: white;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .question {
      font-size: 1.15rem;
      font-weight: bold;
      color: #111;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .answer-btn {
      background-color: white;
      border: 2px solid #ccc;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
      font-family: Arial, sans-serif;
      color: #111;
      transition: border-color 0.15s, background-color 0.15s;
      line-height: 1.4;
    }

    .answer-btn:hover:not(:disabled) {
      border-color: #0e3386;
      background-color: #eef2fb;
    }

    .answer-btn.correct {
      background-color: #d4f0de;
      border-color: #2d7a4b;
      color: #2d7a4b;
      font-weight: bold;
    }

    .answer-btn.wrong {
      background-color: #fde0e0;
      border-color: #b53030;
      color: #b53030;
    }

    .feedback {
      display: none;
      padding: 12px 14px;
      border-radius: 4px;
      font-size: 0.92rem;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .feedback.show { display: block; }
    .feedback.correct { background-color: #d4f0de; color: #2d7a4b; border-left: 4px solid #2d7a4b; }
    .feedback.wrong   { background-color: #fde0e0; color: #b53030;  border-left: 4px solid #b53030; }

    .next-btn {
      background-color: #0e3386;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }

    .next-btn:hover { background-color: #0b2870; }
    .next-btn.show { display: inline-block; }

    .results {
      text-align: center;
      display: none;
    }
    .results.show { display: block; }

    .big-num {
      font-size: 4rem;
      font-weight: bold;
      color: #0e3386;
      line-height: 1;
    }

    .result-label { color: #555; margin-bottom: 20px; }
    .result-msg { font-size: 1.15rem; font-weight: bold; color: #111; margin-bottom: 6px; }
    .result-sub { font-size: 0.95rem; color: #555; margin-bottom: 24px; }

    .restart-btn {
      background-color: #cc3433;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .restart-btn:hover { background-color: #a82626; }

    .back-link {
      color: rgba(255,255,255,0.6);
      text-align: center;
      display: block;
      margin-top: 20px;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: #ffdd57; }

    @media (max-width: 480px) {
      .answers { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<h1>⚾ Cubs Trivia Challenge</h1>
<p class="subtitle">How well do you know the North Side?</p>

<div class="card">

  <!-- Quiz -->
  <div id="quiz-area">
    <div class="top-bar">
      <span>Score: <strong id="score-display">0</strong></span>
      <span id="q-counter">Question 1 of 15</span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 of 15 answered</div>

    <span class="category" id="category-badge">Category</span>
    <div class="question" id="question-text">Loading...</div>

    <div class="answers" id="answers-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">Next Question →</button>
  </div>

  <!-- Results -->
  <div class="results" id="results-area">
    <div style="font-size:3rem; margin-bottom:10px;">🏆</div>
    <div class="big-num" id="final-score">0</div>
    <div class="result-label">out of 15 correct</div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-sub" id="result-sub"></div>
    <button class="restart-btn" onclick="startGame()">Play Again</button>
  </div>

</div>

<a href="scratch.html" class="back-link">← Back to Cubs Fan Page</a>

<script>
  const questions = [
    { q: "In what year did the Cubs win their most recent World Series?", a: ["2016","2015","2017","2008"], correct: 0, cat: "Championships", fact: "The Cubs beat the Cleveland Indians in Game 7, ending a 108-year championship drought." },
    { q: "What is the name of the Cubs' home stadium?", a: ["Guaranteed Rate Field","Comiskey Park","Wrigley Field","Soldier Field"], correct: 2, cat: "Wrigley Field", fact: "Wrigley Field opened in 1914 and is the second-oldest MLB stadium still in use." },
    { q: "What curse supposedly haunted the Cubs for decades?", a: ["Curse of the Bambino","Curse of the Billy Goat","Curse of Black Sox","Curse of Rocky Colavito"], correct: 1, cat: "Cubs Lore", fact: "In 1945, tavern owner Billy Sianis was removed from Wrigley with his goat and allegedly cursed the Cubs." },
    { q: "Which Cubs player made the final throw in the 2016 World Series?", a: ["Javier Báez","David Ross","Kris Bryant","Jon Lester"], correct: 2, cat: "Championships", fact: "Kris Bryant fielded a ground ball and threw across to Anthony Rizzo at first base to clinch the title." },
    { q: "What year was Wrigley Field built?", a: ["1900","1908","1914","1922"], correct: 2, cat: "Wrigley Field", fact: "Wrigley Field was built in 1914, originally called Weeghman Park." },
    { q: "What flag do the Cubs fly after a win?", a: ["A red C flag","A white W flag","A blue W flag","A pennant flag"], correct: 2, cat: "Traditions", fact: "A blue 'W' flag is raised over the center field scoreboard at Wrigley after every Cubs win." },
    { q: "What famous feature lines the outfield walls at Wrigley Field?", a: ["Red brick","Ivy vines","Wooden bleachers","Neon signs"], correct: 1, cat: "Wrigley Field", fact: "Boston ivy was planted on Wrigley's outfield walls in 1937. It's one of baseball's most iconic sights." },
    { q: "What year did Wrigley Field host its first night game?", a: ["1970","1980","1988","1995"], correct: 2, cat: "Wrigley Field", fact: "Wrigley hosted its first official night game on August 9, 1988 — the last MLB park to get lights." },
    { q: "Which street beyond left field is famous for Cubs rooftop clubs?", a: ["Clark Street","Sheffield Avenue","Waveland Avenue","Addison Street"], correct: 2, cat: "Wrigley Field", fact: "Waveland Avenue runs beyond left field. Home run balls sometimes land on the sidewalk there." },
    { q: "Which Cubs slugger hit 66 home runs in 1998?", a: ["Ron Santo","Ernie Banks","Sammy Sosa","Billy Williams"], correct: 2, cat: "Cubs History", fact: "Sammy Sosa hit 66 homers in 1998, losing the home run race to Mark McGwire's 70." },
    { q: "What song is played at Wrigley after every Cubs win?", a: ["Take Me Out to the Ball Game","Go Cubs Go","Sweet Home Chicago","Chicago"], correct: 1, cat: "Traditions", fact: "'Go Cubs Go' was written by Steve Goodman in 1984 and has been played after wins ever since." },
    { q: "Ernie Banks was famous for which phrase?", a: ["Let's Win Two!","Let's Play Two!","Beautiful Day!","Play Ball Cubs!"], correct: 1, cat: "Cubs Legends", fact: "'Let's Play Two!' reflected Ernie Banks' pure love of the game. He played his entire career with the Cubs from 1953–1971." },
    { q: "Who was the Cubs' president of baseball operations who built the 2016 championship team?", a: ["Joe Maddon","Jed Hoyer","Theo Epstein","Tom Ricketts"], correct: 2, cat: "Cubs History", fact: "Theo Epstein rebuilt the Cubs through analytics and the draft, winning a title in 2016 — his second after the 2004 Red Sox." },
    { q: "Approximately how many years did the Cubs go between World Series titles (1908 to 2016)?", a: ["88 years","98 years","108 years","118 years"], correct: 2, cat: "Cubs Lore", fact: "The Cubs went exactly 108 years without winning a World Series, from 1908 to 2016." },
    { q: "What is the Cubs' approximate franchise value today?", a: ["$1.2 billion","$2.8 billion","$4.5 billion","$7 billion"], correct: 2, cat: "Business of Baseball", fact: "The Cubs are one of MLB's most valuable franchises at roughly $4.5 billion, driven by Wrigley, Marquee Sports Network, and brand loyalty." }
  ];

  let current = 0, score = 0, answered = false, shuffled = [];

  function shuffle(arr) {
    return arr.map(v => ({ v, r: Math.random() })).sort((a, b) => a.r - b.r).map(x => x.v);
  }

  function startGame() {
    current = 0; score = 0; answered = false;
    shuffled = shuffle(questions);
    document.getElementById('results-area').classList.remove('show');
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('score-display').textContent = '0';
    loadQuestion();
  }

  function loadQuestion() {
    answered = false;
    const q = shuffled[current];
    const total = shuffled.length;
    document.getElementById('q-counter').textContent = `Question ${current + 1} of ${total}`;
    document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
    document.getElementById('progress-text').textContent = `${current} of ${total} answered`;
    document.getElementById('category-badge').textContent = q.cat;
    document.getElementById('question-text').textContent = q.q;

    const grid = document.getElementById('answers-grid');
    grid.innerHTML = '';
    q.a.forEach((ans, idx) => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = ans;
      btn.onclick = () => pick(idx, q.correct, q.fact);
      grid.appendChild(btn);
    });

    document.getElementById('feedback').className = 'feedback';
    document.getElementById('feedback').textContent = '';
    document.getElementById('next-btn').classList.remove('show');
  }

  function pick(selected, correct, fact) {
    if (answered) return;
    answered = true;
    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(b => b.disabled = true);
    btns[correct].classList.add('correct');
    const fb = document.getElementById('feedback');
    if (selected === correct) {
      score++;
      document.getElementById('score-display').textContent = score;
      fb.className = 'feedback correct show';
      fb.textContent = '✅ Correct! ' + fact;
    } else {
      btns[selected].classList.add('wrong');
      fb.className = 'feedback wrong show';
      fb.textContent = '❌ Not quite. ' + fact;
    }
    document.getElementById('next-btn').classList.add('show');
  }

  function showResults() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('results-area').classList.add('show');
    document.getElementById('final-score').textContent = score;
    const pct = score / shuffled.length;
    let msg, sub;
    if (pct === 1)       { msg = "🏆 Perfect! You're a true Cubs superfan!"; sub = "Ernie Banks would be proud. Let's play two!"; }
    else if (pct >= 0.8) { msg = "⚾ Great job! You really know your Cubs!"; sub = "You belong in the Wrigley bleachers."; }
    else if (pct >= 0.6) { msg = "👍 Solid! Pretty good Cubs knowledge."; sub = "Keep watching those games!"; }
    else if (pct >= 0.4) { msg = "📚 Not bad, room to improve."; sub = "Go rewatch the 2016 World Series documentary."; }
    else                 { msg = "😅 The curse may still be with you..."; sub = "But tomorrow's a new game. Let's play two!"; }
    document.getElementById('result-msg').textContent = msg;
    document.getElementById('result-sub').textContent = sub;
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    current++;
    if (current >= shuffled.length) showResults();
    else loadQuestion();
  });

  startGame();
</script>

</body>
</html>
